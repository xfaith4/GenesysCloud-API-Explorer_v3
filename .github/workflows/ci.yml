name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  pester:
    name: Pester Tests (Fast)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name Pester | Where-Object Version -ge '5.0.0')) {
            Install-Module -Name Pester -MinimumVersion 5.0.0 -Scope CurrentUser -Force -SkipPublisherCheck
          }

      - name: Run Pester (Fast profile)
        shell: pwsh
        run: pwsh -File tools/Test.ps1 -Profile Fast

  pester-full:
    name: Pester Tests (Full profile)
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name Pester | Where-Object Version -ge '5.0.0')) {
            Install-Module -Name Pester -MinimumVersion 5.0.0 -Scope CurrentUser -Force -SkipPublisherCheck
          }

      - name: Run Build (Full profile + Pester)
        shell: pwsh
        run: pwsh -File tools/Build.ps1

  ux-simulations:
    name: UX Simulations
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run UX Simulations
        shell: pwsh
        run: pwsh -File tools/Run-UxSimulations.ps1

      - name: Upload simulation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ux-simulation-runs
          path: artifacts/ux-simulations/
          retention-days: 14
